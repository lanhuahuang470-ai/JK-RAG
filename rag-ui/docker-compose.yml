services:
  backend:
    build:
      context: ..
      dockerfile: rag-ui/Dockerfile.backend
    container_name: rag-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - FAISS_INDEX_PATH=/app/data/vectorstore/faiss_index
    volumes:
      - ../data/uploads:/app/data/uploads
      - ../data/vectorstore:/app/data/vectorstore
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rag-net

networks:
  rag-net:
    driver: bridge